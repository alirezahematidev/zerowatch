name: Claude Code Review

# Automatically reviews every opened/updated pull request. Requires the Claude
# GitHub App and an ANTHROPIC_API_KEY secret (see .github/SETUP.md).
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Review pull request
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this pull request for the zerowatch file-watcher library.
            Focus on:
            - Correctness bugs, race conditions, and resource/handle leaks.
            - Cross-platform behavior (macOS/Windows native recursive vs Linux
              per-directory watchers; the polling backend).
            - Whether the zero-runtime-dependency constraint is preserved.
            - Missing or incorrect tests for the change.
            Be concise; only leave comments where there is a concrete issue.
          claude_args: "--max-turns 20"
